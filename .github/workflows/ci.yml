name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: steady_async
            path: packages/steady_async
          - name: steady_async_riverpod
            path: packages/steady_async_riverpod
          - name: steady_async_bloc
            path: packages/steady_async_bloc
          - name: showcase
            path: apps/showcase
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Use workspace core
        if: matrix.name == 'steady_async_riverpod' || matrix.name == 'steady_async_bloc'
        shell: bash
        run: |
          printf 'dependency_overrides:\n  steady_async:\n    path: ../steady_async\n' > pubspec_overrides.yaml
        working-directory: ${{ matrix.path }}
      - run: flutter pub get
        working-directory: ${{ matrix.path }}
      - run: dart format --output=none --set-exit-if-changed lib test example
        if: matrix.name != 'showcase'
        working-directory: ${{ matrix.path }}
      - run: dart format --output=none --set-exit-if-changed lib test
        if: matrix.name == 'showcase'
        working-directory: ${{ matrix.path }}
      - run: flutter analyze --fatal-infos --fatal-warnings
        working-directory: ${{ matrix.path }}
      - run: flutter test
        working-directory: ${{ matrix.path }}
      - run: dart pub global activate dartdoc
        if: matrix.name != 'showcase'
      - run: dart pub global run dartdoc --no-auto-include-dependencies --no-generate-docs --no-validate-links
        if: matrix.name != 'showcase'
        working-directory: ${{ matrix.path }}
      - run: flutter build web --release
        if: matrix.name == 'showcase'
        working-directory: ${{ matrix.path }}

  minimum-sdk:
    name: Core on Flutter 3.22.3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.3
          cache: true
      - run: flutter pub get
        working-directory: packages/steady_async
      - run: flutter analyze --fatal-infos --fatal-warnings
        working-directory: packages/steady_async
      - run: flutter test
        working-directory: packages/steady_async

  riverpod-minimum-sdk:
    name: Riverpod on Flutter 3.29.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0
          cache: true
      - name: Use workspace core
        shell: bash
        run: |
          printf 'dependency_overrides:\n  steady_async:\n    path: ../steady_async\n' > pubspec_overrides.yaml
        working-directory: packages/steady_async_riverpod
      - run: flutter pub get
        working-directory: packages/steady_async_riverpod
      - run: flutter analyze --fatal-infos --fatal-warnings
        working-directory: packages/steady_async_riverpod
      - run: flutter test
        working-directory: packages/steady_async_riverpod

  bloc-minimum-sdk:
    name: BLoC on Flutter 3.22.3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.3
          cache: true
      - name: Use workspace core
        shell: bash
        run: |
          printf 'dependency_overrides:\n  steady_async:\n    path: ../steady_async\n' > pubspec_overrides.yaml
        working-directory: packages/steady_async_bloc
      - run: flutter pub get
        working-directory: packages/steady_async_bloc
      - run: flutter analyze --fatal-infos --fatal-warnings
        working-directory: packages/steady_async_bloc
      - run: flutter test
        working-directory: packages/steady_async_bloc

  core-platforms:
    name: Core on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.3
          cache: true
      - run: flutter pub get
        working-directory: packages/steady_async
      - run: flutter analyze --fatal-infos --fatal-warnings
        working-directory: packages/steady_async
      - run: flutter test
        working-directory: packages/steady_async

  publish-dry-run:
    name: Publish dry run
    runs-on: ubuntu-latest
    needs:
      [quality, minimum-sdk, riverpod-minimum-sdk, bloc-minimum-sdk, core-platforms]
    strategy:
      fail-fast: false
      matrix:
        path:
          - packages/steady_async
          - packages/steady_async_riverpod
          - packages/steady_async_bloc
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Use workspace core
        if: matrix.path != 'packages/steady_async'
        shell: bash
        run: |
          printf 'dependency_overrides:\n  steady_async:\n    path: ../steady_async\n' > pubspec_overrides.yaml
        working-directory: ${{ matrix.path }}
      - run: flutter pub get
        working-directory: ${{ matrix.path }}
      - run: dart pub publish --dry-run
        working-directory: ${{ matrix.path }}

  apple-consumer:
    name: Local consumer on macOS and iOS Simulator
    runs-on: macos-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.3
          cache: true
      - name: Generate platform runners
        shell: bash
        run: |
          flutter create --platforms=ios,macos --no-pub .
          rm -f test/widget_test.dart
        working-directory: apps/consumer_smoke
      - run: flutter pub get
        working-directory: apps/consumer_smoke
      - run: flutter analyze --fatal-infos --fatal-warnings
        working-directory: apps/consumer_smoke
      - run: flutter test
        working-directory: apps/consumer_smoke
      - run: flutter build macos --release
        working-directory: apps/consumer_smoke
      - run: flutter build ios --simulator --debug --no-codesign
        working-directory: apps/consumer_smoke

  pana:
    name: pub.dev score
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: packages/steady_async
      - run: dart pub global activate pana
      - run: dart pub global run pana --exit-code-threshold 0 .
        working-directory: packages/steady_async
